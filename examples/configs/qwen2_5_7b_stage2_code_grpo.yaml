data:
  train_files: ${oc.env:DATA_DIR,./data/multi_stage_grpo}/deepcoder_train.parquet
  val_files: ${oc.env:DATA_DIR,./data/multi_stage_grpo}/deepcoder_val.parquet
  val_limit: ${oc.env:PRIMARY_VAL_LIMIT,128}
  prompt_key: prompt
  answer_key: answer
  image_key: images
  video_key: videos
  image_dir: null
  video_fps: 2.0
  max_prompt_length: 1536
  max_response_length: 1024
  rollout_batch_size: 16
  mini_rollout_batch_size: null
  val_batch_size: 16
  format_prompt: ./examples/format_prompt/code.jinja
  override_chat_template: null
  shuffle: true
  seed: 1
  min_pixels: 262144
  max_pixels: 4194304
  filter_overlong_prompts: true

algorithm:
  adv_estimator: grpo
  disable_kl: false
  use_kl_loss: true
  kl_penalty: low_var_kl
  kl_coef: 1.0e-2
  online_filtering: false
  filter_key: overall
  filter_low: 0.01
  filter_high: 0.99

worker:
  actor:
    global_batch_size: 16
    micro_batch_size_per_device_for_update: 1
    micro_batch_size_per_device_for_experience: 1
    max_grad_norm: 1.0
    padding_free: true
    dynamic_batching: true
    ulysses_size: 1
    model:
      model_path: Qwen/Qwen2.5-7B-Instruct
      enable_gradient_checkpointing: true
      trust_remote_code: false
      freeze_vision_tower: false
      lora:
        rank: 0
        alpha: 64
        target_modules: all-linear
        exclude_modules: .*visual.*
    optim:
      lr: 5.0e-7
      weight_decay: 1.0e-2
      strategy: adamw
      lr_warmup_ratio: 0.0
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: false
      enable_rank0_init: true
    offload:
      offload_params: true
      offload_optimizer: true

  rollout:
    n: 4
    temperature: 1.0
    top_p: 1.0
    limit_images: 0
    gpu_memory_utilization: 0.55
    enforce_eager: false
    enable_chunked_prefill: false
    tensor_parallel_size: 1
    disable_tqdm: false
    val_override_config:
      temperature: 0.2
      top_p: 0.95
      n: 1

  ref:
    fsdp:
      enable_full_shard: true
      enable_cpu_offload: true
      enable_rank0_init: true
    offload:
      offload_params: false

  reward:
    reward_function: ./examples/reward_function/code.py:compute_score
    reward_function_kwargs:
      timeout: 5.0
    num_cpus: 1

trainer:
  total_epochs: 2
  max_steps: null
  project_name: easy_r1
  experiment_name: qwen2_5_7b_stage2_code_grpo
  logger: ["console", "file", "wandb"]
  nnodes: 1
  n_gpus_per_node: 4
  max_try_make_batch: 20
  critic_warmup: 0
  val_freq: 20
  val_before_train: true
  val_only: false
  primary_val_name: deepcoder
  val_generations_to_log: 2
  save_freq: 20
  save_limit: 3
  save_model_only: false
  save_checkpoint_path: null
  load_checkpoint_path: null
  find_last_checkpoint: true

evaluations:
  - name: apps
    val_files: ${oc.env:DATA_DIR,./data/multi_stage_grpo}/apps_test.parquet
    val_limit: ${oc.env:APPS_VAL_LIMIT,32}
    format_prompt: ./examples/format_prompt/code.jinja
    reward_function: ./examples/reward_function/code.py:compute_score
    reward_function_kwargs:
      timeout: 5.0
    val_batch_size: 8
  - name: humaneval
    val_files: ${oc.env:DATA_DIR,./data/multi_stage_grpo}/humaneval_val.parquet
    val_limit: ${oc.env:HUMANEVAL_VAL_LIMIT,32}
    format_prompt: ./examples/format_prompt/code.jinja
    reward_function: ./examples/reward_function/code.py:compute_score
    reward_function_kwargs:
      timeout: 5.0
    val_batch_size: 16
  - name: livecodebench
    val_files: ${oc.env:DATA_DIR,./data/multi_stage_grpo}/livecodebench_val.parquet
    val_limit: ${oc.env:LIVECODEBENCH_VAL_LIMIT,32}
    format_prompt: ./examples/format_prompt/code.jinja
    reward_function: ./examples/reward_function/code.py:compute_score
    reward_function_kwargs:
      timeout: 5.0
    val_batch_size: 8
  - name: aime25
    val_files: ${oc.env:DATA_DIR,./data/multi_stage_grpo}/aime25_val.parquet
    val_limit: ${oc.env:AIME25_VAL_LIMIT,30}
    format_prompt: ./examples/format_prompt/math.jinja
    reward_function: ./examples/reward_function/math.py:compute_score
    val_batch_size: 64